<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crownfield Chess</title>
    <style>
        :root {
            --bg: #06070a;
            --ink: #f7f3e8;
            --muted: rgba(247, 243, 232, 0.62);
            --line: rgba(247, 243, 232, 0.16);
            --panel: rgba(7, 9, 12, 0.74);
            --cyan: #7de8ff;
            --jade: #83f0ba;
            --gold: #ffd36a;
            --red: #ff6b86;
            --violet: #bda5ff;
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0;
        }

        button,
        select {
            font: inherit;
        }

        #stage {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 22%, rgba(125, 232, 255, 0.12), transparent 32%),
                radial-gradient(circle at 86% 74%, rgba(255, 211, 106, 0.1), transparent 30%),
                linear-gradient(180deg, #11161c 0%, #05070a 58%, #020305 100%);
        }

        #stage canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .grain,
        .vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        .grain {
            opacity: 0.07;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 54px 54px;
            mask-image: radial-gradient(circle at 50% 52%, #000 0%, #000 54%, transparent 82%);
        }

        .vignette {
            background:
                linear-gradient(to right, rgba(0, 0, 0, 0.56), transparent 18%, transparent 82%, rgba(0, 0, 0, 0.56)),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.38), transparent 24%, transparent 72%, rgba(0, 0, 0, 0.68));
        }

        .hud {
            position: fixed;
            top: 18px;
            left: 18px;
            z-index: 20;
            max-width: 430px;
            pointer-events: none;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 11px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 850;
            text-transform: uppercase;
        }

        .mark {
            width: 30px;
            height: 30px;
            position: relative;
            border: 1px solid rgba(255, 211, 106, 0.78);
            transform: rotate(45deg);
            box-shadow: 0 0 24px rgba(255, 211, 106, 0.18), inset 0 0 16px rgba(255, 211, 106, 0.12);
        }

        .mark::before,
        .mark::after {
            content: "";
            position: absolute;
            inset: 7px;
            border: 1px solid rgba(125, 232, 255, 0.74);
        }

        .mark::after {
            inset: 12px;
            border-color: rgba(255, 107, 134, 0.78);
            border-radius: 50%;
        }

        h1 {
            margin: 0;
            font-size: 38px;
            line-height: 0.95;
            text-transform: uppercase;
            text-shadow: 0 0 28px rgba(255, 211, 106, 0.18);
        }

        .readout {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 820;
            text-transform: uppercase;
        }

        .readout strong {
            color: var(--ink);
        }

        .side-panel {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 22;
            display: grid;
            gap: 12px;
            width: 330px;
            pointer-events: none;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--panel);
            backdrop-filter: blur(24px);
            box-shadow: 0 18px 54px rgba(0, 0, 0, 0.38);
            pointer-events: auto;
        }

        .panel-head {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 13px 14px 0;
        }

        .panel h2 {
            margin: 0;
            font-size: 13px;
            text-transform: uppercase;
        }

        .panel-body {
            padding: 12px 14px 14px;
        }

        #status-copy {
            min-height: 42px;
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .meter {
            display: grid;
            grid-template-columns: 64px 1fr 42px;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 850;
            text-transform: uppercase;
        }

        .track {
            height: 5px;
            overflow: hidden;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.08);
        }

        .fill {
            display: block;
            width: 50%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--red), var(--gold), var(--jade));
            transition: width 160ms ease;
        }

        .capture-row {
            display: grid;
            grid-template-columns: 62px 1fr;
            gap: 8px;
            align-items: start;
            min-height: 30px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 850;
            text-transform: uppercase;
        }

        .capture-row + .capture-row {
            margin-top: 9px;
        }

        .captured {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 25px;
            color: var(--ink);
            font-family: Georgia, "Times New Roman", serif;
            font-size: 21px;
            line-height: 1;
        }

        .move-list {
            max-height: 194px;
            overflow: auto;
            display: grid;
            grid-template-columns: 34px 1fr 1fr;
            gap: 1px;
            border: 1px solid rgba(247, 243, 232, 0.08);
            border-radius: 6px;
            background: rgba(247, 243, 232, 0.08);
        }

        .move-list span {
            min-width: 0;
            padding: 7px 8px;
            overflow: hidden;
            background: rgba(5, 7, 10, 0.72);
            color: var(--muted);
            font-size: 12px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .move-list .san {
            color: var(--ink);
            font-weight: 760;
        }

        .controls {
            position: fixed;
            right: 18px;
            bottom: 18px;
            left: 18px;
            z-index: 25;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-width: 860px;
            margin: 0 auto;
            padding: 11px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--panel);
            backdrop-filter: blur(24px);
            box-shadow: 0 18px 54px rgba(0, 0, 0, 0.38);
        }

        .control-btn,
        .control-select,
        .promotion-btn {
            min-height: 40px;
            border: 1px solid rgba(247, 243, 232, 0.15);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--ink);
            cursor: pointer;
            font-size: 12px;
            font-weight: 840;
            text-transform: uppercase;
            transition: border-color 150ms ease, background 150ms ease, color 150ms ease;
        }

        .control-btn {
            min-width: 88px;
            padding: 0 12px;
        }

        .control-select {
            min-width: 94px;
            padding: 0 10px;
            color: var(--ink);
        }

        .control-btn:hover,
        .control-select:hover,
        .promotion-btn:hover,
        .control-btn.active {
            border-color: rgba(255, 211, 106, 0.64);
            background: rgba(255, 211, 106, 0.12);
        }

        .promotion-modal {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: none;
            place-items: center;
            background: rgba(0, 0, 0, 0.42);
            backdrop-filter: blur(8px);
        }

        .promotion-modal.visible {
            display: grid;
        }

        .promotion-card {
            width: min(360px, calc(100vw - 36px));
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(7, 9, 12, 0.92);
            box-shadow: 0 28px 82px rgba(0, 0, 0, 0.58);
        }

        .promotion-card h2 {
            margin: 0;
            padding: 14px;
            border-bottom: 1px solid var(--line);
            font-size: 13px;
            text-transform: uppercase;
        }

        .promotion-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 14px;
        }

        .promotion-btn {
            min-width: 0;
            min-height: 58px;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 30px;
            text-transform: none;
        }

        #fallback {
            position: fixed;
            inset: 18px;
            z-index: 100;
            display: none;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(6, 7, 10, 0.94);
            text-align: center;
        }

        #fallback.visible {
            display: grid;
        }

        @media (max-width: 940px) {
            .side-panel {
                top: auto;
                right: 12px;
                bottom: 84px;
                left: 12px;
                width: auto;
                grid-template-columns: 1fr 1fr;
            }

            .move-list {
                max-height: 122px;
            }
        }

        @media (max-width: 720px) {
            .hud {
                top: 12px;
                left: 12px;
                max-width: 310px;
            }

            h1 {
                font-size: 27px;
            }

            .side-panel {
                display: none;
            }

            .controls {
                right: 10px;
                bottom: 10px;
                left: 10px;
                padding: 9px;
            }

            .control-btn,
            .control-select {
                flex: 1 1 88px;
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <div id="stage"></div>
    <div class="grain"></div>
    <div class="vignette"></div>

    <section class="hud" aria-label="Game status">
        <div class="brand"><span class="mark"></span><span>Grandmaster Atrium</span></div>
        <h1>Crownfield</h1>
        <div class="readout">
            <span>Turn <strong id="turn">White</strong></span>
            <span>Move <strong id="move-number">1</strong></span>
            <span>Eval <strong id="eval">0.0</strong></span>
            <span>Mode <strong id="mode">Engine</strong></span>
        </div>
    </section>

    <aside class="side-panel">
        <section class="panel" aria-label="Position analysis">
            <div class="panel-head">
                <h2 id="status-title">Opening Position</h2>
            </div>
            <div class="panel-body">
                <p id="status-copy">A balanced classical start. White to move.</p>
                <div class="meter">
                    <span>Balance</span>
                    <span class="track"><span id="eval-fill" class="fill"></span></span>
                    <strong id="eval-label">0.0</strong>
                </div>
            </div>
        </section>

        <section class="panel" aria-label="Captured material">
            <div class="panel-head">
                <h2>Material</h2>
            </div>
            <div class="panel-body">
                <div class="capture-row"><span>White</span><div id="captured-by-white" class="captured"></div></div>
                <div class="capture-row"><span>Black</span><div id="captured-by-black" class="captured"></div></div>
            </div>
        </section>

        <section class="panel" aria-label="Move history">
            <div class="panel-head">
                <h2>Notation</h2>
            </div>
            <div class="panel-body">
                <div id="move-list" class="move-list"></div>
            </div>
        </section>
    </aside>

    <nav class="controls" aria-label="Game controls">
        <button id="new-game" class="control-btn" type="button">New</button>
        <button id="undo" class="control-btn" type="button">Undo</button>
        <button id="flip" class="control-btn" type="button">Flip</button>
        <button id="engine" class="control-btn active" type="button">Engine On</button>
        <button id="focus" class="control-btn" type="button">Focus</button>
        <select id="depth" class="control-select" aria-label="Engine depth">
            <option value="1">Depth 1</option>
            <option value="2" selected>Depth 2</option>
            <option value="3">Depth 3</option>
        </select>
    </nav>

    <div id="promotion-modal" class="promotion-modal" aria-hidden="true">
        <section class="promotion-card" role="dialog" aria-modal="true" aria-labelledby="promotion-title">
            <h2 id="promotion-title">Promotion</h2>
            <div class="promotion-options">
                <button class="promotion-btn" type="button" data-promotion="q">♛</button>
                <button class="promotion-btn" type="button" data-promotion="r">♜</button>
                <button class="promotion-btn" type="button" data-promotion="b">♝</button>
                <button class="promotion-btn" type="button" data-promotion="n">♞</button>
            </div>
        </section>
    </div>

    <div id="fallback">
        <p>WebGL initialization failed.</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.174.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.174.0/examples/jsm/",
                "chess.js": "https://cdn.jsdelivr.net/npm/chess.js@1.4.0/dist/esm/chess.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
        import { Chess } from 'chess.js';

        const ui = {
            stage: document.getElementById('stage'),
            fallback: document.getElementById('fallback'),
            turn: document.getElementById('turn'),
            moveNumber: document.getElementById('move-number'),
            eval: document.getElementById('eval'),
            evalLabel: document.getElementById('eval-label'),
            evalFill: document.getElementById('eval-fill'),
            mode: document.getElementById('mode'),
            statusTitle: document.getElementById('status-title'),
            statusCopy: document.getElementById('status-copy'),
            capturedByWhite: document.getElementById('captured-by-white'),
            capturedByBlack: document.getElementById('captured-by-black'),
            moveList: document.getElementById('move-list'),
            newGame: document.getElementById('new-game'),
            undo: document.getElementById('undo'),
            flip: document.getElementById('flip'),
            engine: document.getElementById('engine'),
            focus: document.getElementById('focus'),
            depth: document.getElementById('depth'),
            promotionModal: document.getElementById('promotion-modal')
        };

        const SQ = 4;
        const BOARD_HALF = SQ * 3.5;
        const pieceSymbols = {
            wp: '♙',
            wn: '♘',
            wb: '♗',
            wr: '♖',
            wq: '♕',
            wk: '♔',
            bp: '♟',
            bn: '♞',
            bb: '♝',
            br: '♜',
            bq: '♛',
            bk: '♚'
        };
        const values = {
            p: 100,
            n: 320,
            b: 330,
            r: 500,
            q: 900,
            k: 0
        };
        const initialCounts = {
            w: { p: 8, n: 2, b: 2, r: 2, q: 1, k: 1 },
            b: { p: 8, n: 2, b: 2, r: 2, q: 1, k: 1 }
        };

        const game = new Chess();
        const state = {
            selected: null,
            legalMoves: [],
            lastMove: null,
            pendingPromotion: null,
            orientation: 'white',
            engineEnabled: true,
            engineThinking: false,
            engineJob: 0,
            engineDepth: 2,
            evaluation: 0,
            targetRotation: 0,
            hoverSquare: null,
            time: 0
        };

        let scene;
        let camera;
        let renderer;
        let composer;
        let bloomPass;
        let controls;
        let clock;
        let boardRoot;
        let pieceRoot;
        let indicatorRoot;
        let effectRoot;
        let raycaster;
        let pointer;
        let floorMesh;
        let starMesh;

        const squareMeshes = new Map();
        const pieceMeshes = [];
        const effectParticles = [];
        const tempVec = new THREE.Vector3();
        const tempVecB = new THREE.Vector3();
        const tempColor = new THREE.Color();
        const materials = {};
        const geometries = {};

        try {
            init();
            animate();
        } catch (error) {
            console.error(error);
            ui.fallback.classList.add('visible');
        }

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x05070a, 0.013);

            camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 38, 44);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.78;
            ui.stage.appendChild(renderer.domElement);

            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.18, 0.36, 0.7);
            composer.addPass(bloomPass);
            composer.addPass(new OutputPass());

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.enablePan = false;
            controls.minDistance = 31;
            controls.maxDistance = 78;
            controls.maxPolarAngle = Math.PI * 0.48;
            controls.target.set(0, 0, 0);

            clock = new THREE.Clock();
            raycaster = new THREE.Raycaster();
            pointer = new THREE.Vector2();

            boardRoot = new THREE.Group();
            pieceRoot = new THREE.Group();
            indicatorRoot = new THREE.Group();
            effectRoot = new THREE.Group();
            boardRoot.add(pieceRoot, indicatorRoot, effectRoot);
            scene.add(boardRoot);

            buildGeometries();
            buildMaterials();
            createLights();
            createEnvironment();
            createBoard();
            syncPieces();
            updateUi();
            bindEvents();
        }

        function buildGeometries() {
            geometries.square = new THREE.BoxGeometry(SQ, 0.32, SQ);
            geometries.plate = new THREE.BoxGeometry(SQ * 8.18, 0.5, SQ * 8.18);
            geometries.base = new THREE.CylinderGeometry(0.88, 1.08, 0.34, 32);
            geometries.stem = new THREE.CylinderGeometry(0.42, 0.56, 1.25, 28);
            geometries.pawnHead = new THREE.SphereGeometry(0.68, 28, 16);
            geometries.crown = new THREE.ConeGeometry(0.74, 1.25, 5);
            geometries.rookTop = new THREE.CylinderGeometry(0.72, 0.78, 0.58, 8);
            geometries.bishopHead = new THREE.ConeGeometry(0.7, 1.55, 28);
            geometries.knightHead = new THREE.BoxGeometry(0.88, 1.28, 0.58);
            geometries.crossBar = new THREE.BoxGeometry(0.92, 0.16, 0.18);
            geometries.crossStem = new THREE.BoxGeometry(0.18, 0.82, 0.18);
            geometries.ring = new THREE.TorusGeometry(1.38, 0.055, 8, 60);
            geometries.dot = new THREE.CylinderGeometry(0.34, 0.34, 0.045, 28);
            geometries.captureRing = new THREE.TorusGeometry(1.48, 0.065, 8, 60);
            geometries.mote = new THREE.SphereGeometry(0.08, 16, 10);
            geometries.spark = new THREE.SphereGeometry(0.075, 16, 10);
        }

        function buildMaterials() {
            materials.lightSquare = new THREE.MeshStandardMaterial({
                color: 0xd7c08f,
                roughness: 0.54,
                metalness: 0.12,
                emissive: 0x22180a,
                emissiveIntensity: 0.16
            });
            materials.darkSquare = new THREE.MeshStandardMaterial({
                color: 0x31505a,
                roughness: 0.52,
                metalness: 0.18,
                emissive: 0x061217,
                emissiveIntensity: 0.3
            });
            materials.plate = new THREE.MeshStandardMaterial({
                color: 0x13171d,
                roughness: 0.38,
                metalness: 0.56,
                emissive: 0x03080b,
                emissiveIntensity: 0.48
            });
            materials.whitePiece = new THREE.MeshStandardMaterial({
                color: 0xf0eadb,
                roughness: 0.28,
                metalness: 0.42,
                emissive: 0x2a2314,
                emissiveIntensity: 0.16
            });
            materials.blackPiece = new THREE.MeshStandardMaterial({
                color: 0x232a33,
                roughness: 0.24,
                metalness: 0.68,
                emissive: 0x07101c,
                emissiveIntensity: 0.46
            });
            materials.whiteTrim = new THREE.MeshBasicMaterial({
                color: 0xffd36a,
                transparent: true,
                opacity: 0.42,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            materials.blackTrim = new THREE.MeshBasicMaterial({
                color: 0x7de8ff,
                transparent: true,
                opacity: 0.46,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            materials.legal = new THREE.MeshBasicMaterial({
                color: 0x83f0ba,
                transparent: true,
                opacity: 0.62,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            materials.capture = new THREE.MeshBasicMaterial({
                color: 0xff6b86,
                transparent: true,
                opacity: 0.72,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            materials.selection = new THREE.MeshBasicMaterial({
                color: 0xffd36a,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            materials.lastMove = new THREE.MeshBasicMaterial({
                color: 0x7de8ff,
                transparent: true,
                opacity: 0.34,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            materials.mote = new THREE.MeshBasicMaterial({
                color: 0xb8f2ff,
                transparent: true,
                opacity: 0.28,
                depthWrite: false
            });
        }

        function createLights() {
            scene.add(new THREE.HemisphereLight(0xcceeff, 0x080a0d, 1.25));

            const key = new THREE.DirectionalLight(0xfff3d0, 1.8);
            key.position.set(-18, 34, 22);
            scene.add(key);

            const rim = new THREE.DirectionalLight(0x7de8ff, 1.3);
            rim.position.set(26, 18, -26);
            scene.add(rim);

            const gold = new THREE.PointLight(0xffd36a, 2.4, 60, 2.1);
            gold.position.set(-18, 14, 16);
            scene.add(gold);

            const cyan = new THREE.PointLight(0x7de8ff, 2.0, 60, 2.1);
            cyan.position.set(18, 12, -18);
            scene.add(cyan);
        }

        function createEnvironment() {
            floorMesh = new THREE.Mesh(
                new THREE.CircleGeometry(52, 96),
                new THREE.MeshBasicMaterial({
                    color: 0x0b1116,
                    transparent: true,
                    opacity: 0.94
                })
            );
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.position.y = -0.4;
            scene.add(floorMesh);

            const moteCount = 34;
            starMesh = new THREE.InstancedMesh(geometries.mote, materials.mote, moteCount);
            starMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            const dummy = new THREE.Object3D();
            for (let i = 0; i < moteCount; i++) {
                dummy.position.set(randomRange(-54, 54), randomRange(10, 38), randomRange(-54, 54));
                dummy.scale.setScalar(randomRange(0.55, 1.25));
                dummy.updateMatrix();
                starMesh.setMatrixAt(i, dummy.matrix);
            }
            scene.add(starMesh);
        }

        function createBoard() {
            const plate = new THREE.Mesh(geometries.plate, materials.plate);
            plate.position.y = -0.26;
            boardRoot.add(plate);

            for (let rank = 1; rank <= 8; rank++) {
                for (let file = 0; file < 8; file++) {
                    const square = `${String.fromCharCode(97 + file)}${rank}`;
                    const isLight = (file + rank) % 2 === 1;
                    const mesh = new THREE.Mesh(geometries.square, isLight ? materials.lightSquare.clone() : materials.darkSquare.clone());
                    mesh.position.copy(squareToPosition(square));
                    mesh.position.y = 0;
                    mesh.userData.square = square;
                    mesh.userData.baseMaterial = mesh.material;
                    squareMeshes.set(square, mesh);
                    boardRoot.add(mesh);
                }
            }
        }

        function bindEvents() {
            window.addEventListener('resize', onResize);
            renderer.domElement.addEventListener('pointermove', onPointerMove);
            renderer.domElement.addEventListener('pointerdown', onPointerDown);
            ui.newGame.addEventListener('click', resetGame);
            ui.undo.addEventListener('click', undoMove);
            ui.flip.addEventListener('click', flipBoard);
            ui.focus.addEventListener('click', focusCamera);
            ui.engine.addEventListener('click', toggleEngine);
            ui.depth.addEventListener('change', () => {
                state.engineDepth = Number(ui.depth.value);
            });
            document.querySelectorAll('[data-promotion]').forEach((button) => {
                button.addEventListener('click', () => finishPromotion(button.dataset.promotion));
            });
            window.addEventListener('keydown', onKeyDown);
        }

        function syncPieces() {
            pieceMeshes.forEach((mesh) => pieceRoot.remove(mesh));
            pieceMeshes.length = 0;

            for (let rank = 1; rank <= 8; rank++) {
                for (let file = 0; file < 8; file++) {
                    const square = `${String.fromCharCode(97 + file)}${rank}`;
                    const piece = game.get(square);
                    if (!piece) continue;
                    const mesh = createPiece(piece, square);
                    mesh.position.copy(squareToPosition(square));
                    mesh.position.y = 0.25;
                    pieceRoot.add(mesh);
                    pieceMeshes.push(mesh);
                }
            }

            updateIndicators();
        }

        function createPiece(piece, square) {
            const group = new THREE.Group();
            const bodyMaterial = piece.color === 'w' ? materials.whitePiece : materials.blackPiece;
            const trimMaterial = piece.color === 'w' ? materials.whiteTrim : materials.blackTrim;
            const heightScale = piece.type === 'p' ? 0.82 : piece.type === 'k' ? 1.22 : piece.type === 'q' ? 1.16 : 1;

            const base = new THREE.Mesh(geometries.base, bodyMaterial);
            base.position.y = 0.18;
            group.add(base);

            const stem = new THREE.Mesh(geometries.stem, bodyMaterial);
            stem.position.y = 0.96;
            stem.scale.y = heightScale;
            group.add(stem);

            const ring = new THREE.Mesh(geometries.ring, trimMaterial.clone());
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.42;
            ring.scale.setScalar(piece.type === 'p' ? 0.66 : 0.84);
            group.add(ring);

            addPieceHead(group, piece, bodyMaterial, trimMaterial);
            setUserDataRecursive(group, { square, piece });
            group.userData.square = square;
            group.userData.piece = piece;
            return group;
        }

        function addPieceHead(group, piece, bodyMaterial, trimMaterial) {
            if (piece.type === 'p') {
                const head = new THREE.Mesh(geometries.pawnHead, bodyMaterial);
                head.position.y = 1.78;
                group.add(head);
                return;
            }

            if (piece.type === 'r') {
                const top = new THREE.Mesh(geometries.rookTop, bodyMaterial);
                top.position.y = 1.88;
                group.add(top);
                for (let i = 0; i < 4; i++) {
                    const merlon = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.28, 0.36), bodyMaterial);
                    const angle = i * Math.PI * 0.5;
                    merlon.position.set(Math.cos(angle) * 0.54, 2.25, Math.sin(angle) * 0.54);
                    merlon.rotation.y = angle;
                    group.add(merlon);
                }
                return;
            }

            if (piece.type === 'n') {
                const head = new THREE.Mesh(geometries.knightHead, bodyMaterial);
                head.position.set(0.1, 2.02, -0.1);
                head.rotation.z = -0.28;
                group.add(head);
                const crest = new THREE.Mesh(new THREE.ConeGeometry(0.38, 0.82, 4), trimMaterial);
                crest.position.set(-0.22, 2.55, -0.02);
                crest.rotation.z = 0.35;
                group.add(crest);
                return;
            }

            if (piece.type === 'b') {
                const head = new THREE.Mesh(geometries.bishopHead, bodyMaterial);
                head.position.y = 2.1;
                group.add(head);
                const slit = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.86, 0.08), trimMaterial);
                slit.position.set(0.22, 2.16, 0.2);
                slit.rotation.z = -0.42;
                group.add(slit);
                return;
            }

            if (piece.type === 'q') {
                const crown = new THREE.Mesh(geometries.crown, bodyMaterial);
                crown.position.y = 2.16;
                group.add(crown);
                for (let i = 0; i < 5; i++) {
                    const jewel = new THREE.Mesh(new THREE.SphereGeometry(0.13, 12, 8), trimMaterial);
                    const angle = i / 5 * Math.PI * 2;
                    jewel.position.set(Math.cos(angle) * 0.56, 2.78, Math.sin(angle) * 0.56);
                    group.add(jewel);
                }
                return;
            }

            const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.54, 0.68, 0.74, 6), bodyMaterial);
            crown.position.y = 2.08;
            group.add(crown);

            const crossStem = new THREE.Mesh(geometries.crossStem, trimMaterial);
            crossStem.position.y = 2.78;
            const crossBar = new THREE.Mesh(geometries.crossBar, trimMaterial);
            crossBar.position.y = 2.92;
            group.add(crossStem, crossBar);
        }

        function updateIndicators() {
            indicatorRoot.clear();

            if (state.lastMove) {
                createSquareGlow(state.lastMove.from, materials.lastMove, 1.08);
                createSquareGlow(state.lastMove.to, materials.lastMove, 1.08);
            }

            if (state.selected) {
                createSquareGlow(state.selected, materials.selection, 1.14);
                state.legalMoves.forEach((move) => {
                    const occupied = game.get(move.to);
                    const mesh = new THREE.Mesh(occupied ? geometries.captureRing : geometries.dot, occupied ? materials.capture : materials.legal);
                    mesh.position.copy(squareToPosition(move.to));
                    mesh.position.y = 0.24;
                    mesh.rotation.x = -Math.PI / 2;
                    mesh.scale.setScalar(occupied ? 1 : 0.92);
                    indicatorRoot.add(mesh);
                });
            }
        }

        function createSquareGlow(square, material, scale) {
            const glow = new THREE.Mesh(geometries.ring, material);
            glow.position.copy(squareToPosition(square));
            glow.position.y = 0.28;
            glow.rotation.x = -Math.PI / 2;
            glow.scale.setScalar(scale);
            indicatorRoot.add(glow);
        }

        function onPointerMove(event) {
            setPointerFromEvent(event);
            const hit = getBoardHit();
            state.hoverSquare = hit?.square || null;
        }

        function onPointerDown(event) {
            if (event.button !== 0 || state.engineThinking || state.pendingPromotion || isGameOver()) return;
            setPointerFromEvent(event);
            const hit = getBoardHit();
            if (!hit) {
                clearSelection();
                return;
            }
            handleSquare(hit.square);
        }

        function setPointerFromEvent(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        }

        function getBoardHit() {
            raycaster.setFromCamera(pointer, camera);
            const objects = [...pieceMeshes, ...squareMeshes.values()];
            const hits = raycaster.intersectObjects(objects, true);
            for (const hit of hits) {
                const square = findSquareFromObject(hit.object);
                if (square) {
                    return { square, object: hit.object };
                }
            }
            return null;
        }

        function handleSquare(square) {
            const piece = game.get(square);
            if (state.selected) {
                if (state.selected === square) {
                    clearSelection();
                    return;
                }

                const targetMoves = state.legalMoves.filter((move) => move.to === square);
                if (targetMoves.length) {
                    if (targetMoves.some((move) => move.promotion)) {
                        openPromotion(state.selected, square);
                    } else {
                        makeMove({ from: state.selected, to: square });
                    }
                    return;
                }

                if (piece && piece.color === game.turn()) {
                    selectSquare(square);
                    return;
                }

                clearSelection();
                return;
            }

            if (piece && piece.color === game.turn()) {
                selectSquare(square);
            }
        }

        function selectSquare(square) {
            state.selected = square;
            state.legalMoves = game.moves({ square, verbose: true });
            updateIndicators();
        }

        function clearSelection() {
            state.selected = null;
            state.legalMoves = [];
            updateIndicators();
        }

        function openPromotion(from, to) {
            state.pendingPromotion = { from, to };
            ui.promotionModal.classList.add('visible');
            ui.promotionModal.setAttribute('aria-hidden', 'false');
        }

        function finishPromotion(promotion) {
            if (!state.pendingPromotion) return;
            const { from, to } = state.pendingPromotion;
            state.pendingPromotion = null;
            ui.promotionModal.classList.remove('visible');
            ui.promotionModal.setAttribute('aria-hidden', 'true');
            makeMove({ from, to, promotion });
        }

        function makeMove(moveInput, fromEngine = false) {
            const beforeFen = game.fen();
            const move = game.move(toMoveInput(moveInput));
            if (!move) return false;

            state.lastMove = { from: move.from, to: move.to, san: move.san };
            clearSelection();
            spawnMoveEffects(move);
            syncPieces();
            updateUi();

            if (!fromEngine) {
                scheduleEngineMove();
            }

            if (beforeFen === game.fen()) {
                updateUi();
            }
            return true;
        }

        function scheduleEngineMove() {
            if (!state.engineEnabled || game.turn() !== 'b' || isGameOver()) return;
            const job = ++state.engineJob;
            state.engineThinking = true;
            updateUi();
            window.setTimeout(() => {
                if (job !== state.engineJob || !state.engineEnabled || game.turn() !== 'b' || isGameOver()) {
                    state.engineThinking = false;
                    updateUi();
                    return;
                }
                const move = chooseEngineMove(state.engineDepth);
                state.engineThinking = false;
                if (move) {
                    makeMove(move, true);
                } else {
                    updateUi();
                }
            }, 260);
        }

        function chooseEngineMove(depth) {
            const moves = orderMoves(game.moves({ verbose: true }));
            if (!moves.length) return null;
            let bestMove = moves[0];
            let bestScore = Infinity;

            for (const move of moves) {
                game.move(toMoveInput(move));
                const score = search(depth - 1, -Infinity, Infinity);
                game.undo();
                if (score < bestScore) {
                    bestScore = score;
                    bestMove = move;
                }
            }
            return bestMove;
        }

        function search(depth, alpha, beta) {
            if (depth <= 0 || isGameOver()) {
                return evaluatePosition();
            }

            const moves = orderMoves(game.moves({ verbose: true }));
            if (game.turn() === 'w') {
                let best = -Infinity;
                for (const move of moves) {
                    game.move(toMoveInput(move));
                    best = Math.max(best, search(depth - 1, alpha, beta));
                    game.undo();
                    alpha = Math.max(alpha, best);
                    if (beta <= alpha) break;
                }
                return best;
            }

            let best = Infinity;
            for (const move of moves) {
                game.move(toMoveInput(move));
                best = Math.min(best, search(depth - 1, alpha, beta));
                game.undo();
                beta = Math.min(beta, best);
                if (beta <= alpha) break;
            }
            return best;
        }

        function orderMoves(moves) {
            return moves.slice().sort((a, b) => moveScore(b) - moveScore(a));
        }

        function moveScore(move) {
            let score = 0;
            if (move.captured) score += values[move.captured] - values[move.piece] * 0.08;
            if (move.promotion) score += values[move.promotion] || 0;
            if (move.san.includes('+')) score += 28;
            if (move.san.includes('#')) score += 9000;
            return score;
        }

        function toMoveInput(move) {
            const input = { from: move.from, to: move.to };
            if (move.promotion) input.promotion = move.promotion;
            return input;
        }

        function evaluatePosition() {
            if (callGame('isCheckmate', 'in_checkmate')) {
                return game.turn() === 'w' ? -100000 : 100000;
            }
            if (callGame('isDraw', 'in_draw') || callGame('isStalemate', 'in_stalemate')) {
                return 0;
            }

            let score = 0;
            forEachSquare((square) => {
                const piece = game.get(square);
                if (!piece) return;
                const sign = piece.color === 'w' ? 1 : -1;
                const positionScore = positionalBonus(piece, square);
                score += sign * (values[piece.type] + positionScore);
            });

            const turn = game.turn();
            const mobility = game.moves().length;
            score += (turn === 'w' ? 1 : -1) * mobility * 1.5;
            return score;
        }

        function positionalBonus(piece, square) {
            const file = square.charCodeAt(0) - 97;
            const rank = Number(square[1]) - 1;
            const center = 3.5 - (Math.abs(file - 3.5) + Math.abs(rank - 3.5)) * 0.5;
            if (piece.type === 'p') {
                const advance = piece.color === 'w' ? rank : 7 - rank;
                return advance * 7 + center * 4;
            }
            if (piece.type === 'n' || piece.type === 'b') return center * 12;
            if (piece.type === 'q') return center * 4;
            return center * 2;
        }

        function spawnMoveEffects(move) {
            const from = squareToPosition(move.from);
            const to = squareToPosition(move.to);
            const color = move.captured ? new THREE.Color(0xff6b86) : new THREE.Color(0xffd36a);
            spawnParticles(move.captured ? to : from.lerp(to, 0.5), color, move.captured ? 10 : 5);
        }

        function spawnParticles(position, color, count) {
            for (let i = 0; i < count; i++) {
                const mesh = new THREE.Mesh(geometries.spark, new THREE.MeshBasicMaterial({
                    color,
                    transparent: true,
                    opacity: 0.46,
                    depthWrite: false
                }));
                const size = randomRange(0.85, 1.35);
                mesh.position.copy(position);
                mesh.position.y = randomRange(1.2, 2.8);
                mesh.scale.setScalar(size);
                mesh.userData.velocity = new THREE.Vector3(randomRange(-1.0, 1.0), randomRange(0.9, 2.6), randomRange(-1.0, 1.0));
                mesh.userData.life = randomRange(0.48, 0.78);
                mesh.userData.maxLife = mesh.userData.life;
                mesh.userData.size = size;
                effectRoot.add(mesh);
                effectParticles.push(mesh);
            }
        }

        function resetGame() {
            game.reset();
            state.selected = null;
            state.legalMoves = [];
            state.lastMove = null;
            state.pendingPromotion = null;
            state.engineThinking = false;
            state.engineJob += 1;
            ui.promotionModal.classList.remove('visible');
            syncPieces();
            updateUi();
        }

        function undoMove() {
            if (state.engineThinking || state.pendingPromotion) return;
            state.engineJob += 1;
            game.undo();
            if (state.engineEnabled && game.turn() === 'b') {
                game.undo();
            }
            state.lastMove = null;
            clearSelection();
            syncPieces();
            updateUi();
        }

        function flipBoard() {
            state.orientation = state.orientation === 'white' ? 'black' : 'white';
            state.targetRotation = state.orientation === 'white' ? 0 : Math.PI;
        }

        function focusCamera() {
            controls.target.set(0, 0, 0);
            camera.position.set(state.orientation === 'white' ? 0 : 0, 38, state.orientation === 'white' ? 44 : -44);
            controls.update();
        }

        function toggleEngine() {
            state.engineEnabled = !state.engineEnabled;
            state.engineJob += 1;
            state.engineThinking = false;
            ui.engine.classList.toggle('active', state.engineEnabled);
            ui.engine.textContent = state.engineEnabled ? 'Engine On' : 'Engine Off';
            updateUi();
            scheduleEngineMove();
        }

        function onKeyDown(event) {
            if (event.code === 'Escape') {
                clearSelection();
                return;
            }
            if (event.code === 'KeyF') {
                flipBoard();
                return;
            }
            if (event.code === 'KeyU') {
                undoMove();
                return;
            }
            if (event.code === 'KeyN') {
                resetGame();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.033);
            state.time += dt;

            boardRoot.rotation.y += shortestAngle(boardRoot.rotation.y, state.targetRotation) * (1 - Math.pow(0.001, dt));
            starMesh.rotation.y += dt * 0.018;
            floorMesh.rotation.z += dt * 0.008;

            pieceMeshes.forEach((piece) => {
                piece.rotation.y += Math.sin(state.time * 1.4 + piece.position.x) * 0.0008;
            });

            updateEffects(dt);
            controls.update();
            bloomPass.strength = 0.1 + (state.selected ? 0.025 : 0) + Math.min(0.035, effectParticles.length * 0.0012);
            composer.render();
        }

        function updateEffects(dt) {
            for (let i = effectParticles.length - 1; i >= 0; i--) {
                const particle = effectParticles[i];
                particle.userData.life -= dt;
                particle.position.addScaledVector(particle.userData.velocity, dt);
                particle.userData.velocity.y -= dt * 5;
                const alpha = Math.max(0, particle.userData.life / particle.userData.maxLife);
                particle.material.opacity = alpha * 0.42;
                particle.scale.setScalar(particle.userData.size * (0.75 + (1 - alpha) * 0.65));
                if (particle.userData.life <= 0) {
                    effectRoot.remove(particle);
                    effectParticles.splice(i, 1);
                }
            }
        }

        function updateUi() {
            state.evaluation = evaluatePosition();
            const evalPawns = state.evaluation / 100;
            const turnName = game.turn() === 'w' ? 'White' : 'Black';
            const history = game.history();

            ui.turn.textContent = state.engineThinking ? 'Thinking' : turnName;
            ui.moveNumber.textContent = String(Math.floor(history.length / 2) + 1);
            ui.eval.textContent = formatEval(evalPawns);
            ui.evalLabel.textContent = formatEval(evalPawns);
            ui.evalFill.style.width = `${clamp(50 + evalPawns * 7, 3, 97)}%`;
            ui.mode.textContent = state.engineEnabled ? 'Engine' : 'Local';

            const status = getStatusText();
            ui.statusTitle.textContent = status.title;
            ui.statusCopy.textContent = status.copy;
            renderCaptured();
            renderMoveList(history);
        }

        function getStatusText() {
            if (callGame('isCheckmate', 'in_checkmate')) {
                return {
                    title: 'Checkmate',
                    copy: `${game.turn() === 'w' ? 'Black' : 'White'} has forced mate.`
                };
            }
            if (callGame('isStalemate', 'in_stalemate')) {
                return {
                    title: 'Stalemate',
                    copy: 'The side to move has no legal move and no check.'
                };
            }
            if (callGame('isDraw', 'in_draw')) {
                return {
                    title: 'Draw',
                    copy: 'The position has reached a drawn state.'
                };
            }
            if (callGame('isCheck', 'in_check')) {
                return {
                    title: 'Check',
                    copy: `${game.turn() === 'w' ? 'White' : 'Black'} king is under direct pressure.`
                };
            }
            if (state.engineThinking) {
                return {
                    title: 'Sparring Engine',
                    copy: `Depth ${state.engineDepth} search is evaluating candidate lines.`
                };
            }
            if (state.selected) {
                return {
                    title: `${state.selected.toUpperCase()} Selected`,
                    copy: `${state.legalMoves.length} legal continuations are available.`
                };
            }
            return {
                title: 'Live Position',
                copy: `${game.turn() === 'w' ? 'White' : 'Black'} to move. ${state.engineEnabled ? 'Black is handled by the sparring engine.' : 'Local board control is active.'}`
            };
        }

        function renderCaptured() {
            const counts = { w: { p: 0, n: 0, b: 0, r: 0, q: 0, k: 0 }, b: { p: 0, n: 0, b: 0, r: 0, q: 0, k: 0 } };
            forEachSquare((square) => {
                const piece = game.get(square);
                if (piece) counts[piece.color][piece.type] += 1;
            });

            ui.capturedByWhite.textContent = capturedString('b', counts);
            ui.capturedByBlack.textContent = capturedString('w', counts);
        }

        function capturedString(color, counts) {
            const order = ['q', 'r', 'b', 'n', 'p'];
            let output = '';
            order.forEach((type) => {
                const missing = initialCounts[color][type] - counts[color][type];
                output += pieceSymbols[`${color}${type}`].repeat(Math.max(0, missing));
            });
            return output || '–';
        }

        function renderMoveList(history) {
            ui.moveList.innerHTML = '';
            for (let i = 0; i < history.length; i += 2) {
                const moveNo = Math.floor(i / 2) + 1;
                const white = history[i] || '';
                const black = history[i + 1] || '';
                ui.moveList.appendChild(moveCell(String(moveNo)));
                ui.moveList.appendChild(moveCell(white, true));
                ui.moveList.appendChild(moveCell(black, true));
            }
            ui.moveList.scrollTop = ui.moveList.scrollHeight;
        }

        function moveCell(text, san = false) {
            const cell = document.createElement('span');
            cell.textContent = text;
            if (san) cell.className = 'san';
            return cell;
        }

        function isGameOver() {
            return callGame('isGameOver', 'game_over') || callGame('isCheckmate', 'in_checkmate') || callGame('isDraw', 'in_draw');
        }

        function callGame(...names) {
            for (const name of names) {
                if (typeof game[name] === 'function') {
                    return game[name]();
                }
            }
            return false;
        }

        function squareToPosition(square) {
            const file = square.charCodeAt(0) - 97;
            const rank = Number(square[1]) - 1;
            return new THREE.Vector3((file - 3.5) * SQ, 0, (3.5 - rank) * SQ);
        }

        function forEachSquare(callback) {
            for (let rank = 1; rank <= 8; rank++) {
                for (let file = 0; file < 8; file++) {
                    callback(`${String.fromCharCode(97 + file)}${rank}`);
                }
            }
        }

        function findSquareFromObject(object) {
            let current = object;
            while (current) {
                if (current.userData?.square) return current.userData.square;
                current = current.parent;
            }
            return null;
        }

        function setUserDataRecursive(object, data) {
            object.userData = { ...object.userData, ...data };
            object.children.forEach((child) => setUserDataRecursive(child, data));
        }

        function shortestAngle(from, to) {
            return Math.atan2(Math.sin(to - from), Math.cos(to - from));
        }

        function formatEval(value) {
            if (!Number.isFinite(value)) return '0.0';
            if (Math.abs(value) < 0.05) return '0.0';
            return `${value > 0 ? '+' : ''}${value.toFixed(1)}`;
        }

        function randomRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function onResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(width, height);
            composer.setSize(width, height);
            bloomPass.setSize(width, height);
        }
    </script>
</body>
